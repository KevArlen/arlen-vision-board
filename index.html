<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Galaxie ARLEN — Poste de commande</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================================
   LA GALAXIE ARLEN — Vision board / poste de commande · V2 (lecture seule)
   DA validée Kevin : objets flottants droits dans un ciel blanc cassé, pastel
   apaisé, flottaison verticale + rotation orbitale lente (pausable), zéro cliché
   spatial. DONNÉES (objet CHANTIERS) strictement séparées du RENDU (render*).
   Phase 2 = remplacer loadData() par une lecture Notion + envoi des commentaires.
   ========================================================================== */
:root{
  --ciel:#FBF9F5; --encre:#3A3650; --encre-doux:#6E6A82; --encre-tres-doux:#9C99AC;
  --carte:#FFFFFFEE; --bord:#EBE7F0;
  --c-T1:#A7C5EB; --c-T2:#C9BBEC; --c-T3:#AEDCC9; --c-T4:#F2D8A7; --c-T5:#F3B6C9;
  --c-GOV:#D8D6E0; --c-PROD:#BBD3E8; --c-GTM:#F4C9A8; --c-BRAND:#E9B8DA; --c-JUR:#BFD8C2;
  --c-STACK:#A9CBD6; --c-CONSEIL:#D6CDB6;
  --e-encours:#5BA88A; --e-enfile:#E0A94E; --e-bloque:#D8745C; --e-fait:#6E8FC2; --e-reporte:#B4B0BF; --e-dormant:#C9C6D4;
  --ombre:0 18px 50px -28px rgba(80,70,120,.45); --radius:30px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:var(--encre);background:var(--ciel);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before,body::after{content:"";position:fixed;z-index:0;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.5}
body::before{width:52vw;height:52vw;left:-12vw;top:-14vw;background:radial-gradient(circle,#D9CCF2,transparent 70%);animation:drift1 28s ease-in-out infinite}
body::after{width:50vw;height:50vw;right:-14vw;bottom:-16vw;background:radial-gradient(circle,#F7CEDC,transparent 70%);animation:drift2 33s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(4vw,3vh)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-3vw,-3vh)}}
.wrap{position:relative;z-index:1;max-width:1480px;margin:0 auto;padding:24px 30px 90px}

/* ---- bandeau de pilotage ---- */
header{display:flex;flex-wrap:wrap;align-items:flex-end;gap:16px 26px;margin-bottom:8px}
.titre h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;margin:0}
.titre p{margin:3px 0 0;color:var(--encre-doux);font-size:14px}
.cap{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--bord);border-radius:26px;padding:8px 16px;font-size:13.5px;box-shadow:var(--ombre);max-width:520px}
.cap b{font-weight:600}
.stats{display:flex;gap:9px;margin-left:auto;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;border-radius:18px;padding:6px 13px;font-size:12.5px;font-weight:500;border:1px solid var(--bord);background:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s}
.pill:hover{transform:translateY(-2px);box-shadow:var(--ombre)}
.pill .dot{width:8px;height:8px;border-radius:50%}
.pill.c .dot{background:var(--e-encours)} .pill.c{color:#3e7e63}
.pill.b .dot{background:var(--e-bloque)} .pill.b{color:#9a4e3a}
.pill.k .dot{background:var(--e-enfile)} .pill.k{color:#8a6420}
.frais{font-size:12px;color:var(--encre-tres-doux);margin-top:4px}

/* ---- onglets + flèches + bouton pause ---- */
.nav{display:flex;align-items:center;gap:8px;margin:18px 0 14px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:#fff;border:1px solid var(--bord);border-radius:22px;padding:4px;box-shadow:var(--ombre)}
.tab{border:0;background:transparent;font-family:inherit;font-size:14px;color:var(--encre-doux);padding:8px 18px;border-radius:18px;cursor:pointer;transition:all .25s}
.tab.on{background:var(--encre);color:#fff}
.tools{margin-left:auto;display:flex;gap:6px;align-items:center}
.tools button{height:38px;border-radius:19px;border:1px solid var(--bord);background:#fff;cursor:pointer;font-size:13px;color:var(--encre-doux);padding:0 14px;transition:transform .2s,box-shadow .2s;display:inline-flex;align-items:center;gap:6px}
.tools button:hover{transform:translateY(-2px);box-shadow:var(--ombre)}
.tools .ico{width:38px;padding:0;justify-content:center;font-size:17px}

.view{display:none;animation:fadein .5s ease}
.view.on{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---- vue galaxie : objets flottants droits, orbite lente pausable ---- */
.galtoolbar{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.seg{display:inline-flex;background:#fff;border:1px solid var(--bord);border-radius:16px;padding:3px}
.seg button{border:0;background:transparent;font-family:inherit;font-size:12.5px;color:var(--encre-doux);padding:6px 13px;border-radius:13px;cursor:pointer}
.seg button.on{background:var(--encre);color:#fff}
.galaxie{display:grid;grid-template-columns:repeat(auto-fill,minmax(262px,1fr));gap:46px 44px;padding:34px 20px 24px;align-items:start}
.orbit{will-change:transform}
.secteur{position:relative;border-radius:var(--radius);padding:20px 20px 16px;background:var(--carte);border:1px solid #fff;box-shadow:var(--ombre);backdrop-filter:blur(4px);animation:flotte var(--fdur,7s) ease-in-out var(--fdel,0s) infinite}
.secteur::before{content:"";position:absolute;inset:0;border-radius:var(--radius);background:var(--teinte);opacity:.32;z-index:-1}
.secteur::after{content:"";position:absolute;inset:0;border-radius:var(--radius);box-shadow:inset 0 0 0 1.5px #ffffffaa;pointer-events:none}
@keyframes flotte{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.sec-tete{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:8px}
.sec-nom{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
.sec-terr{font-size:11px;color:var(--encre-doux);background:#ffffffcc;border-radius:10px;padding:2px 8px;white-space:nowrap}
.sec-insts{font-size:11.5px;color:var(--encre-doux);margin:0 0 11px}
.chips{display:flex;flex-direction:column;gap:6px}
.chip{position:relative;display:flex;align-items:center;gap:9px;background:#ffffffe6;border:1px solid #fff;border-radius:15px;padding:8px 11px 15px;cursor:pointer;font-size:12.5px;transition:transform .18s,box-shadow .18s;text-align:left;width:100%}
.chip:hover{transform:translateX(3px);box-shadow:0 8px 22px -16px rgba(80,70,120,.6)}
.chip .edot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.chip .ctitre{flex:1;line-height:1.25}
.chip-prog{position:absolute;left:11px;right:11px;bottom:6px;height:3px;border-radius:3px;background:#ECEAF1;overflow:hidden}
.chip-prog i{display:block;height:100%;border-radius:3px}
.chip.chaud{background:#FBE6E0;box-shadow:0 0 0 1.6px #D55A45aa}
.chip.chaud .ctitre{color:#A8412A;font-weight:500}
.chip.chaud .edot{background:#D9483A;animation:chaudPulse 1.6s ease-in-out infinite}
@keyframes chaudPulse{0%,100%{box-shadow:0 0 0 0 rgba(217,72,58,.6)}50%{box-shadow:0 0 0 6px rgba(217,72,58,0)}}
body.paused .chip.chaud .edot{animation-play-state:paused}
.chk{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:#5BA88A;color:#fff;font-size:9px;font-weight:600;flex:0 0 auto}
.chip.fait{background:#EDF5EF}
.chip.fait .ctitre{color:#3E7E63}
.lt.done{text-decoration:line-through;text-decoration-color:#A9D2C0;color:var(--encre-tres-doux)}
.edot.s-en_cours{background:var(--e-encours)} .edot.s-en_file{background:var(--e-enfile)}
.edot.s-bloque{background:var(--e-bloque);animation:battement 1.8s ease-in-out infinite}
.edot.s-fait{background:var(--e-fait)} .edot.s-reporte{background:var(--e-reporte)} .edot.s-dormant{background:var(--e-dormant)}
body.paused .edot.s-bloque{animation-play-state:paused}
@keyframes battement{0%,100%{box-shadow:0 0 0 0 rgba(216,116,92,.55)}50%{box-shadow:0 0 0 5px rgba(216,116,92,0)}}

/* ---- chemin critique : étages nommés + flux ---- */
.critique{margin:34px auto 0;max-width:1120px;background:var(--carte);border:1px solid #fff;border-radius:26px;box-shadow:var(--ombre);padding:16px 22px 20px}
.critique h3{font-family:'Fraunces',serif;font-weight:500;font-size:15px;margin:0 0 2px;display:flex;align-items:center;gap:8px}
.critique .sub{font-size:11.5px;color:var(--encre-doux);margin:0 0 6px}
.cc-line{position:relative;display:flex;align-items:stretch;gap:6px;overflow-x:auto;padding:10px 2px 4px}
.cc-node{flex:0 0 auto;max-width:160px;background:#fff;border:1px solid var(--bord);border-radius:18px;padding:9px 13px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.cc-node:hover{transform:translateY(-3px);box-shadow:var(--ombre)}
.cc-node .et{font-size:10px;font-weight:600;color:var(--encre-tres-doux);text-transform:uppercase;letter-spacing:.4px}
.cc-node .t{font-size:12px;font-weight:500;line-height:1.2;margin-top:1px}
.cc-node .e{font-size:10.5px;color:var(--encre-doux);margin-top:3px;display:flex;align-items:center;gap:5px}
.cc-node.goulot{border-color:var(--e-encours);animation:pulseGoulot 2.2s ease-in-out infinite}
body.paused .cc-node.goulot{animation-play-state:paused}
@keyframes pulseGoulot{0%,100%{box-shadow:0 0 0 0 rgba(91,168,138,.5)}50%{box-shadow:0 0 0 8px rgba(91,168,138,0)}}
.cc-flux{flex:0 0 26px;height:3px;border-radius:3px;background:linear-gradient(90deg,#E6DEF5,#CFE3D8,#E6DEF5);background-size:200% 100%;animation:flux 2.4s linear infinite;align-self:center}
body.paused .cc-flux{animation-play-state:paused}
@keyframes flux{0%{background-position:200% 0}100%{background-position:-200% 0}}
.cc-node.cap{background:linear-gradient(180deg,#fff,#FBEFF3);border-color:var(--c-T5)}

/* ---- vue liste ---- */
.filtres{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.filtres select{font-family:inherit;font-size:13px;color:var(--encre);background:#fff;border:1px solid var(--bord);border-radius:14px;padding:8px 12px;cursor:pointer}
.filtres label{font-size:11.5px;color:var(--encre-tres-doux);margin-right:-4px}
.compte{margin-left:auto;font-size:12.5px;color:var(--encre-doux)}
.liste{display:flex;flex-direction:column;gap:8px}
.ligne{position:relative;display:grid;grid-template-columns:14px 2fr .8fr .9fr .9fr;gap:14px;align-items:center;background:var(--carte);border:1px solid #fff;border-radius:18px;padding:13px 18px 18px;cursor:pointer;box-shadow:0 10px 30px -26px rgba(80,70,120,.6);transition:transform .18s,box-shadow .18s}
.ligne.chaud{box-shadow:0 0 0 1.5px #D55A4599,0 10px 30px -26px rgba(80,70,120,.6)}
.ligne:hover{transform:translateY(-2px);box-shadow:var(--ombre)}
.ligne .lt{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.ligne .meta{font-size:12px;color:var(--encre-doux)}
.ligne .etat-tag{font-size:11.5px;font-weight:500;padding:3px 11px;border-radius:12px;justify-self:start}
.ligne .fait-date{font-size:11.5px;color:var(--e-fait);font-weight:500}
.barre{width:10px;height:10px;border-radius:50%}
@media(max-width:760px){.ligne{grid-template-columns:12px 1fr}.ligne .meta,.ligne .etat-tag,.ligne .fait-date{display:none}}

/* ---- vue calendrier ---- */
.calbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.cal{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px}
.calcol{flex:0 0 210px;min-width:210px}
.calcol .jour{font-family:'Fraunces',serif;font-size:14px;font-weight:500;padding:6px 4px;border-bottom:2px solid var(--bord);margin-bottom:10px}
.calcard{background:var(--carte);border:1px solid #fff;border-radius:16px;padding:11px 13px;margin-bottom:9px;cursor:pointer;box-shadow:0 10px 26px -24px rgba(80,70,120,.6);transition:transform .18s,box-shadow .18s}
.calcard:hover{transform:translateY(-2px);box-shadow:var(--ombre)}
.calcard .ct{font-size:12.5px;font-weight:500;display:flex;gap:7px;align-items:flex-start;line-height:1.3}
.calcard .cm{font-size:11px;color:var(--encre-doux);margin-top:4px}

/* ---- carte de détail riche ---- */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(58,54,80,.30);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:22px;opacity:0;pointer-events:none;transition:opacity .3s;overflow-y:auto}
.scrim.on{opacity:1;pointer-events:auto}
.detail{width:560px;max-width:100%;background:#fff;border-radius:28px;box-shadow:0 40px 90px -30px rgba(58,54,80,.6);padding:26px 30px;transform:scale(.92) translateY(14px);opacity:0;transition:transform .32s cubic-bezier(.2,.9,.3,1.2),opacity .3s;margin:auto}
.scrim.on .detail{transform:none;opacity:1}
.detail .dtete{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.detail h2{font-family:'Fraunces',serif;font-weight:500;font-size:22px;margin:0;line-height:1.22}
.detail .fermer{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid var(--bord);background:#fff;cursor:pointer;font-size:17px;color:var(--encre-doux)}
.detail .dtags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.dtag{font-size:11.5px;font-weight:500;padding:3px 11px;border-radius:12px}
.detail .resume{width:100%;border-collapse:collapse;margin-bottom:4px}
.detail .resume td{padding:7px 0;font-size:13.5px;border-top:1px solid var(--bord)}
.detail .resume td.k{color:var(--encre-doux);width:40%}
.detail .resume td.v{text-align:right;font-weight:500}
.detail .canal{color:var(--e-fait);font-weight:500}
.prog-detail{margin-top:16px}
.prog-detail .pl{display:flex;justify-content:space-between;font-size:12px;color:var(--encre-doux);margin-bottom:6px}
.prog-detail .pl b{color:var(--encre);font-weight:600}
.prog-bar{height:8px;border-radius:8px;background:#ECEAF1;overflow:hidden}
.prog-bar i{display:block;height:100%;border-radius:8px}
.ligne-prog{position:absolute;left:18px;right:18px;bottom:6px;height:3px;border-radius:3px;background:#ECEAF1;overflow:hidden}
.ligne-prog i{display:block;height:100%;border-radius:3px}
.recit{margin-top:16px}
.recit .quoi{font-size:14px;line-height:1.6;color:var(--encre);background:#FBF9F5;border-radius:16px;padding:14px 16px}
.etape{display:flex;gap:12px;margin-top:14px}
.etape .marq{flex:0 0 auto;width:30px;text-align:center}
.etape .marq .pt{width:11px;height:11px;border-radius:50%;margin:4px auto 0}
.etape .marq .bar{width:2px;height:calc(100% - 8px);background:var(--bord);margin:2px auto 0}
.etape .corps .lab{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--encre-tres-doux)}
.etape .corps .txt{font-size:13.5px;line-height:1.55;color:var(--encre-doux);margin-top:2px}
.etape.av .pt{background:var(--e-reporte)} .etape.mt .pt{background:var(--e-encours)} .etape.ap .pt{background:var(--e-enfile)}
.etape.mt .txt{color:var(--encre);font-weight:500}
.commentaire{margin-top:18px;border-top:1px solid var(--bord);padding-top:14px}
.commentaire .lab{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--encre-tres-doux);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.commentaire textarea{width:100%;min-height:64px;border:1px solid var(--bord);border-radius:14px;padding:10px 12px;font-family:inherit;font-size:13px;color:var(--encre);resize:vertical;background:#FBF9F5}
.commentaire .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.commentaire .ph{font-size:11px;color:var(--encre-tres-doux)}
.commentaire button{border:1px solid var(--bord);background:#fff;border-radius:13px;padding:7px 14px;font-family:inherit;font-size:12.5px;color:var(--encre-doux);cursor:pointer}

.legende{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:26px;font-size:11.5px;color:var(--encre-doux)}
.legende span{display:inline-flex;align-items:center;gap:6px}
.legende i{width:9px;height:9px;border-radius:50%;display:inline-block}
.pied{text-align:center;margin-top:30px;font-size:11px;color:var(--encre-tres-doux)}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="titre">
      <h1>La Galaxie ARLEN</h1>
      <p>Poste de commande — où on est · où on va · qui fait quoi</p>
    </div>
    <div class="cap" id="cap"></div>
    <div class="stats">
      <button class="pill c" id="pill-cours"><span class="dot"></span><span id="n-cours">0</span> en cours</button>
      <button class="pill k" id="pill-file"><span class="dot"></span><span id="n-file">0</span> en file</button>
      <button class="pill b" id="pill-bloc"><span class="dot"></span><span id="n-bloc">0</span> bloqués</button>
    </div>
  </header>
  <div class="frais" id="frais"></div>

  <div class="nav">
    <div class="tabs" id="tabs">
      <button class="tab on" data-v="galaxie">✦ Galaxie</button>
      <button class="tab" data-v="liste">☰ Liste</button>
      <button class="tab" data-v="calendrier">◷ Calendrier</button>
    </div>
    <div class="tools">
      <button id="pause"><span id="pause-ico">⏸</span> <span id="pause-txt">rotation</span></button>
      <button class="ico" id="prev" aria-label="vue précédente">‹</button>
      <button class="ico" id="next" aria-label="vue suivante">›</button>
    </div>
  </div>

  <section class="view on" id="v-galaxie">
    <div class="galtoolbar">
      <div class="seg" id="grp"><button class="on" data-g="territoire">par territoire</button><button data-g="instance">par instance</button></div>
    </div>
    <div class="galaxie" id="galaxie"></div>
    <div class="critique">
      <h3>🎯&nbsp;Le chemin critique — étage par étage vers les ASR</h3>
      <p class="sub">Chaque jalon = un étage de la chaîne. Tout le reste tourne en parallèle.</p>
      <div class="cc-line" id="cc-line"></div>
    </div>
  </section>

  <section class="view" id="v-liste">
    <div class="filtres">
      <label>instance</label><select id="f-inst"></select>
      <label>état</label><select id="f-etat"></select>
      <label>territoire</label><select id="f-terr"></select>
      <label>complété</label><select id="f-comp">
        <option value="">à tout moment</option>
        <option value="hier">terminé hier</option>
        <option value="semaine">cette semaine</option>
        <option value="dernsem">semaine dernière</option>
        <option value="2sem">il y a 2 semaines</option>
      </select>
      <label>tri</label><select id="f-tri">
        <option value="action">date d'action ↓</option>
        <option value="completion">date de complétion ↓</option>
        <option value="cible">date-cible ↑</option>
        <option value="titre">titre A→Z</option>
        <option value="etat">état</option>
      </select>
      <span class="compte" id="compte"></span>
    </div>
    <div class="liste" id="liste"></div>
  </section>

  <section class="view" id="v-calendrier">
    <div class="calbar">
      <div class="seg" id="calmode">
        <button class="on" data-m="realise">ce qui s'est passé</button>
        <button data-m="action">par date d'action</button>
        <button data-m="cible">par date-cible</button>
      </div>
      <span class="compte" id="cal-compte"></span>
    </div>
    <div class="cal" id="cal"></div>
  </section>

  <div class="legende">
    <span><i style="background:#5BA88A"></i>en cours</span>
    <span><i style="background:#E0A94E"></i>en file</span>
    <span><i style="background:#D8745C"></i>bloqué</span>
    <span><span class="chk" style="width:14px;height:14px;font-size:8px">✓</span>fait</span>
    <span><i style="background:#B4B0BF"></i>reporté</span>
    <span><i style="background:#C9C6D4"></i>dormant</span>
    <span>🎯 chemin critique</span>
  </div>
  <div class="pied" id="pied"></div>
</div>

/* chaque carte FLOTTE (bob vertical) ET dérive en cercle dans le sens des aiguilles
   d'une montre (droite→bas→gauche→haut). Phases/rayons variés → mouvement organique,

        (done?'<span class="chk">✓</span>':'<span class="edot s-'+c.etat+'"></span>')+'<span class="ctitre">'+c.titre+'</span>'+(c.critique?'<span>🎯</span>':'')+
        '<span class="chip-prog"><i style="width:'+c.progress+'%;background:'+pc+'"></i></span></button>';}).join('')+'</div>';
    cell.appendChild(el);host.appendChild(cell);
  });

}
/* CONVOI CONTINU : chaque carte glisse en douceur vers la position de la suivante,
   en parcours serpentin (→ ↓ ← ↓ →…), en boucle, à vitesse lente et constante.
   Le flottement (bob) reste sur la carte interne. Stop = fige le convoi, garde le bob. */
let galRAF=null, galPaused=false, galAcc=0, galLast=0, gSlots=[], gSnake=[], gCells=[];
const PER_SLOT=17000;
function measureGalaxy(){
  const host=document.getElementById("galaxie");gCells=[...host.children];
  gSlots=gCells.map(c=>({x:c.offsetLeft,y:c.offsetTop}));
  const ys=[...new Set(gSlots.map(s=>Math.round(s.y)))].sort((a,b)=>a-b);
  gSnake=[];
  ys.forEach((y,ri)=>{const row=gSlots.map((s,idx)=>({idx,x:s.x})).filter(o=>Math.round(gSlots[o.idx].y)===y).sort((a,b)=>a.x-b.x);
    if(ri%2)row.reverse();row.forEach(o=>gSnake.push(o.idx));});
}
function tickGalaxy(ts){
  if(!galLast)galLast=ts;galAcc+=(ts-galLast)/PER_SLOT;galLast=ts;
  const n=gCells.length;
  if(n>1&&gSnake.length===n){
    gCells.forEach((cell,i)=>{const p0=gSnake.indexOf(i);const u=p0+galAcc;const k=Math.floor(u),f=u-k;
      const a=gSlots[gSnake[((k%n)+n)%n]],b=gSlots[gSnake[(((k+1)%n)+n)%n]];
      cell.style.transform="translate("+(a.x+(b.x-a.x)*f-gSlots[i].x).toFixed(1)+"px,"+(a.y+(b.y-a.y)*f-gSlots[i].y).toFixed(1)+"px)";});
  }
  galRAF=requestAnimationFrame(tickGalaxy);
}
function startGalaxy(){if(galRAF||galPaused)return;measureGalaxy();gCells.forEach(c=>c.style.transition="");galAcc=0;galLast=0;galRAF=requestAnimationFrame(tickGalaxy);}
function stopGalaxy(){if(galRAF){cancelAnimationFrame(galRAF);galRAF=null;}galAcc=0;galLast=0;
  gCells.forEach(c=>{c.style.transition="transform 1.1s cubic-bezier(.4,0,.2,1)";c.style.transform="";});
  setTimeout(()=>gCells.forEach(c=>{c.style.transition="";}),1200);}

function compBucket(c,b){
  if(!b)return true; if(c.etat!=="fait"||!c.date_completion)return false;
  const j=joursDepuis(c.date_completion);
  if(b==="hier")return j>=1&&j<=1; if(b==="semaine")return j>=0&&j<=7;
  if(b==="dernsem")return j>=8&&j<=14; if(b==="2sem")return j>=15&&j<=21; return true;
}

  document.getElementById("x").onclick=closeDetail;
  const cmt=document.getElementById("cmt"),key="cmt:"+id;
  cmt.value=localStorage.getItem(key)||"";
  document.getElementById("cmt-save").onclick=()=>{localStorage.setItem(key,cmt.value);document.getElementById("cmt-save").textContent="Gardé ✓";};
}
function closeDetail(){document.getElementById("scrim").classList.remove("on");}

const VUES=["galaxie","liste","calendrier"];let vue=0;
function setVue(i){
  vue=(i+VUES.length)%VUES.length;const nom=VUES[vue];
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.v===nom));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  document.getElementById("v-"+nom).classList.add("on");
  if(nom==="liste")renderListe();if(nom==="calendrier")renderCalendrier();
  if(nom==="galaxie")startGalaxy();else stopGalaxy();
}
function val(id){return document.getElementById(id).value;}

function wire(){
  document.getElementById("tabs").onclick=e=>{const t=e.target.closest(".tab");if(t)setVue(VUES.indexOf(t.dataset.v));};
  document.getElementById("prev").onclick=()=>setVue(vue-1);
  document.getElementById("next").onclick=()=>setVue(vue+1);
  document.getElementById("pause").onclick=()=>{galPaused=!galPaused;
    if(galPaused)stopGalaxy();else startGalaxy();
    document.getElementById("pause-ico").textContent=galPaused?"▶":"⏸";
    document.getElementById("pause-txt").textContent=galPaused?"reprendre":"rotation";};
  document.getElementById("grp").onclick=e=>{const b=e.target.closest("button");if(!b)return;groupBy=b.dataset.g;
    document.querySelectorAll("#grp button").forEach(x=>x.classList.toggle("on",x===b));renderGalaxie();};
  document.getElementById("calmode").onclick=e=>{const b=e.target.closest("button");if(!b)return;calMode=b.dataset.m;
    document.querySelectorAll("#calmode button").forEach(x=>x.classList.toggle("on",x===b));renderCalendrier();};
  ["f-inst","f-etat","f-terr","f-comp","f-tri"].forEach(id=>document.getElementById(id).onchange=renderListe);
  document.body.addEventListener("click",e=>{const el=e.target.closest("[data-id]");if(el&&!e.target.closest(".scrim"))openDetail(el.dataset.id);});
  document.getElementById("pill-cours").onclick=()=>{setVue(1);document.getElementById("f-etat").value="en_cours";renderListe();};
  document.getElementById("pill-file").onclick=()=>{setVue(1);document.getElementById("f-etat").value="en_file";renderListe();};
  document.getElementById("pill-bloc").onclick=()=>{setVue(1);document.getElementById("f-etat").value="bloque";renderListe();};
  document.getElementById("scrim").addEventListener("click",e=>{if(e.target.id==="scrim")closeDetail();});
  document.addEventListener("keydown",e=>{
    if(e.key==="Escape")closeDetail();
    else if(!document.getElementById("scrim").classList.contains("on")){
      if(e.key==="ArrowRight")setVue(vue+1);else if(e.key==="ArrowLeft")setVue(vue-1);}
  });
  let x0=null;const m=document.querySelector(".wrap");
  m.addEventListener("touchstart",e=>x0=e.touches[0].clientX,{passive:true});
  m.addEventListener("touchend",e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>70)setVue(dx<0?vue+1:vue-1);x0=null;},{passive:true});
  let rz;window.addEventListener("resize",()=>{clearTimeout(rz);rz=setTimeout(()=>{if(VUES[vue]==="galaxie"&&!galPaused){stopGalaxy();startGalaxy();}},250);});
}

renderBandeau();fillFiltres();renderGalaxie();wire();
</script>
</body>
</html>
